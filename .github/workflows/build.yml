name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------- Windows --------------------
      - name: Set up Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name RemoveLoopPoints \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            app.py

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: RemoveLoopPoints-windows
          path: dist/RemoveLoopPoints.exe

      # -------------------- macOS --------------------
      # ВАЖНО: Python из actions/setup-python на macOS часто собран без
      # нормально прилинкованного Tcl/Tk — из-за этого customtkinter/tkinter
      # либо не запускается, либо падает при старте. Ставим Python через
      # Homebrew вместе с python-tk — так Tk гарантированно на месте.
      # brew --prefix используется вместо жёстко прописанного пути, чтобы
      # работало и на Intel, и на Apple Silicon раннерах одинаково.
      - name: Install Python + Tk (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.11 python-tk@3.11
          echo "$(brew --prefix python@3.11)/libexec/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pyinstaller

      - name: Build app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          python3 -m PyInstaller --noconfirm --windowed \
            --name RemoveLoopPoints \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            app.py

      # Приложение не подписано Developer ID (это платный аккаунт Apple),
      # поэтому Gatekeeper всё равно будет ругаться при первом запуске.
      # Ad-hoc подпись хотя бы позволяет собрать валидный .app-бандл.
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - "dist/RemoveLoopPoints.app"

      - name: Zip app bundle (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/RemoveLoopPoints.app" "RemoveLoopPoints-macos.zip"

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: RemoveLoopPoints-macos
          path: RemoveLoopPoints-macos.zip

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/RemoveLoopPoints-windows/RemoveLoopPoints.exe
            artifacts/RemoveLoopPoints-macos/RemoveLoopPoints-macos.zip
