name: Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name RemoveLoopPoints app.py

      - name: Build macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name RemoveLoopPoints app.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RemoveLoopPoints-${{ runner.os }}
          path: dist/
